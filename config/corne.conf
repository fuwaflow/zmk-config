# Lighting
# https://zmk.dev/docs/config/lighting

# Enable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y

# Underglow toggling also controls external power
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# Turn off RGB underglow when keyboard goes into idle state
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Turn off RGB underglow when USB is disconnected
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# Hue step (degrees 0–359)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10

# Saturation step (%)
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=10

# Brightness step (%)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10

# Default hue (0–359)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0

# Default saturation (0–100%)
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100

# Default brightness (0–100%)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Default effect speed (1–5)
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# Default effect (0=Solid, 1=Breathe, 2=Spectrum, 3=Swirl)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# Start with underglow enabled
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# Minimum brightness (%)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MIN=0

# Maximum brightness (%)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=100


# Displays
# https://zmk.dev/docs/config/displays

# Enable display support
CONFIG_ZMK_DISPLAY=y

# Blank display when idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Display refresh period (ms)
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=10

# Invert display colors
CONFIG_ZMK_DISPLAY_INVERT=n

# Use built-in status screen
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Use system work queue for updates
CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y

# Show active layer
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# Show battery status
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Show battery percentage instead of icon
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Show output status (USB/BLE)
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Show words per minute
CONFIG_ZMK_WIDGET_WPM_STATUS=y


# Power Management Configuration
# https://zmk.dev/docs/config/power

# Enable soft off (deep sleep)
CONFIG_ZMK_PM_SOFT_OFF=y
